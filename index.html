<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Stockholm Kaffe</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body>


<main class="kaffe-scene">

<img src="assets/table-cloth.png" class="table-cloth" draggable="false">


<header class="brand">
<img src="assets/stockholm-kaffee-logo.png" class="brand-mark">
<h1>STOCKHOLM KAFFE</h1>
</header>


<img src="assets/guest-check.png" class="asset guest-check draggable" draggable="false">
<img src="assets/menu.png" class="asset menu draggable modal-trigger" data-modal="menu" draggable="false">

<img src="assets/calling-card.png" class="asset calling-card draggable modal-trigger" data-modal="contact" draggable="false">

<img src="assets/postcard.png" class="asset postcard draggable modal-trigger" data-modal="mail" draggable="false">

<img src="assets/newspaper.png" class="asset newspaper draggable modal-trigger" data-modal="news" draggable="false">

<img src="assets/coffee.png" class="asset coffee draggable" draggable="false">
<img src="assets/sugar-packet-1.png" class="asset sugar-one draggable" draggable="false">
<img src="assets/sugar-packet-2.png" class="asset sugar-two draggable" draggable="false">
<img src="assets/flower.png" class="asset flower draggable" draggable="false">
<img src="assets/napkin.png" class="asset napkin draggable" draggable="false">


</main>



<!-- MODAL -->

<div class="modal-overlay">

<div class="modal">

<button class="close-modal">×</button>

<div class="modal-content"></div>

</div>

</div>



<script src="script.js"></script>

</body>
</html>
